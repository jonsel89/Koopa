<!DOCTYPE html>
<html>

<head>
  <title>Koopa - Mascota</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <section class="card">

    <h1 id="nombre">Cargando...</h1>

    <p id="notas"></p>

    <a id="telefono" class="btn"></a>

  </section>

  <script>

    const params = new URLSearchParams(window.location.search);
    const petId = params.get("id");

    async function cargarDatos() {
      try {

        // 🔥 LLAMADA A TU BACKEND (NO AIRTABLE)
        const res = await fetch(`/api/getPet?id=${petId}`);
        const data = await res.json();

        if (!data || data.error) {
          document.getElementById("nombre").innerText = "Mascota no encontrada";
          return;
        }

        document.getElementById("nombre").innerText = data.nombre || "Sin nombre";
        document.getElementById("notas").innerText = data.notas || "";

        const telLink = document.getElementById("telefono");

        if (data.telefono) {
          telLink.innerText = "📞 Llamar al dueño";
          telLink.href = "tel:" + data.telefono;
        } else {
          telLink.innerText = "Teléfono no disponible";
        }

      } catch (error) {
        console.error(error);
        document.getElementById("nombre").innerText = "Error cargando datos";
      }
    }

    cargarDatos();

  </script>

</body>

</html>
